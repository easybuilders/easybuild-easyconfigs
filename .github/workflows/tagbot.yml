# Never check out the PR code here. This workflow has write permissions.
# Always review any changes to this PR or the accompanying tagbot.py script critically

name: Tagbot
on:
  workflow_run:
    workflows: ['analyze']
    types: [completed]

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  tagbot:
    if: >
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-24.04

    permissions:
      pull-requests: write

    steps:
    - name: Download analysis artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
          name: analysis
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
    - name: Tag and comment
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR: ${{ github.event.workflow_run.pull_requests[0].number }}
      run: |
        # labels
        gh pr edit "$PR" --add-label    "$(jq -r '.labels     | join(",")' analysis.json)"
        gh pr edit "$PR" --remove-label "$(jq -r '.not_labels | join(",")' analysis.json)"

        # comment
        MARKER="<!-- tagbot -->"
        # TODO:
        COMMENT_ID=$(
          gh pr view "$PR" --json comments | jq -r '.comments[] | select(.body | contains("MARKER")) | .id'
        )
        echo "Found $COMMENT_ID altering it"

